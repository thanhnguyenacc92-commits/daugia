
<h2 class="sr-only">Yahoo Auctions Japan Crawler</h2>

<div id="app" style="font-family:var(--font-sans);padding:1rem 0;max-width:680px">

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:38px;height:38px;background:var(--color-text-primary);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="ti ti-gavel" aria-hidden="true" style="color:var(--color-background-primary);font-size:18px"></i>
      </div>
      <div>
        <div style="font-size:15px;font-weight:500;color:var(--color-text-primary);line-height:1.3">Yahoo Auctions Crawler</div>
        <div style="font-size:12px;color:var(--color-text-tertiary)">Tìm kiếm đấu giá từ Nhật Bản</div>
      </div>
    </div>

  </div>

  <div style="display:flex;gap:8px;margin-bottom:12px">
    <input id="kw" type="text" value="kindle" placeholder="Nhập từ khóa..." style="flex:1;height:40px;padding:0 14px;font-size:14px;border:0.5px solid var(--color-border-secondary);border-radius:10px;background:var(--color-background-primary);color:var(--color-text-primary);outline:none;font-family:var(--font-sans)">
    <button id="searchBtn" onclick="doSearch()" style="height:40px;padding:0 20px;background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;font-family:var(--font-sans)">
      <i class="ti ti-search" aria-hidden="true" style="font-size:14px"></i> Tìm kiếm
    </button>
  </div>

  <div style="border:0.5px solid var(--color-border-tertiary);border-radius:12px;overflow:hidden;margin-bottom:1rem;background:var(--color-background-primary)">
    <div onclick="toggleF()" style="display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer">
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--color-text-primary)">
        <i class="ti ti-adjustments-horizontal" aria-hidden="true" style="font-size:15px;color:var(--color-text-secondary)"></i>
        Bộ lọc nâng cao
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="acnt" style="display:none;font-size:11px;padding:2px 8px;border-radius:99px;background:#E6F1FB;color:#185FA5;font-weight:500"></span>
        <i id="chev" class="ti ti-chevron-down" aria-hidden="true" style="font-size:15px;color:var(--color-text-secondary);transition:transform .2s"></i>
      </div>
    </div>
    <div id="fbody" style="display:none;padding:14px 16px;border-top:0.5px solid var(--color-border-tertiary)">
      <div style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">Danh mục & Vị trí</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:12px;color:var(--color-text-secondary)">Danh mục</label>
          <select id="cat" style="height:34px;padding:0 8px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:var(--color-background-secondary);color:var(--color-text-primary);font-family:var(--font-sans)">
            <option value="2084288672">Kindle / E-reader</option>
            <option value="23312">Điện thoại</option>
            <option value="23316">Laptop / PC</option>
            <option value="2084228536">Máy ảnh</option>
            <option value="">Tất cả</option>
          </select>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:12px;color:var(--color-text-secondary)">Tỉnh nhận hàng</label>
          <select id="pref" style="height:34px;padding:0 8px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:var(--color-background-secondary);color:var(--color-text-primary);font-family:var(--font-sans)">
            <option value="12">千葉 Chiba</option>
            <option value="13">東京 Tokyo</option>
            <option value="14">神奈川 Kanagawa</option>
            <option value="27">大阪 Osaka</option>
            <option value="23">愛知 Aichi</option>
          </select>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:12px;color:var(--color-text-secondary)">Số kết quả</label>
          <select id="pp" style="height:34px;padding:0 8px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:var(--color-background-secondary);color:var(--color-text-primary);font-family:var(--font-sans)">
            <option value="20">20</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
          </select>
        </div>
      </div>

      <div style="height:0.5px;background:var(--color-border-tertiary);margin:0 0 12px"></div>
      <div style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">Khoảng giá & Sắp xếp</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:12px;color:var(--color-text-secondary)">Giá thấp nhất (¥)</label>
          <input id="minp" type="number" placeholder="0" min="0" step="500" oninput="updCnt()" style="height:34px;padding:0 8px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:var(--color-background-secondary);color:var(--color-text-primary);font-family:var(--font-sans)">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:12px;color:var(--color-text-secondary)">Giá cao nhất (¥)</label>
          <input id="maxp" type="number" placeholder="Không giới hạn" min="0" step="500" oninput="updCnt()" style="height:34px;padding:0 8px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:var(--color-background-secondary);color:var(--color-text-primary);font-family:var(--font-sans)">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:12px;color:var(--color-text-secondary)">Sắp xếp</label>
          <select id="srt" style="height:34px;padding:0 8px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:var(--color-background-secondary);color:var(--color-text-primary);font-family:var(--font-sans)">
            <option value="new">Mới nhất</option>
            <option value="end">Kết thúc sớm</option>
            <option value="price_asc">Giá tăng</option>
            <option value="price_desc">Giá giảm</option>
            <option value="bids">Nhiều bid</option>
          </select>
        </div>
      </div>

      <div style="height:0.5px;background:var(--color-border-tertiary);margin:0 0 12px"></div>
      <div style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">Loại đấu giá</div>
      <div id="tchips" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px"></div>

      <div style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">Điều kiện thêm</div>
      <div id="ochips" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px"></div>

      <div style="height:0.5px;background:var(--color-border-tertiary);margin:0 0 12px"></div>
      <div style="display:flex;align-items:center;gap:8px">
        <button onclick="resetF()" style="height:32px;padding:0 14px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:transparent;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans)">
          <i class="ti ti-rotate" aria-hidden="true" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>Đặt lại
        </button>
        <button onclick="doSearch()" style="height:32px;padding:0 16px;font-size:12px;background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:8px;cursor:pointer;font-weight:500;font-family:var(--font-sans);display:flex;align-items:center;gap:5px">
          <i class="ti ti-search" aria-hidden="true" style="font-size:12px"></i>Áp dụng & tìm
        </button>
        <span id="stxt" style="font-size:12px;color:var(--color-text-tertiary);margin-left:auto"></span>
      </div>
    </div>
  </div>

  <div id="notices"></div>
  <div id="results">
    <div style="text-align:center;padding:3rem 1rem">
      <i class="ti ti-device-desktop-search" aria-hidden="true" style="font-size:36px;color:var(--color-text-tertiary);display:block;margin-bottom:10px"></i>
      <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:4px">Nhập từ khóa và nhấn tìm kiếm</p>
      <small style="font-size:12px;color:var(--color-text-tertiary)">Dữ liệu lấy trực tiếp từ Yahoo Auctions Japan</small>
    </div>
  </div>
</div>

<script>
var typeOpts=[{v:'all',l:'Tất cả'},{v:'auction',l:'Đấu giá'},{v:'buynow',l:'Mua ngay 即決'}];
var extraOpts=[{v:'free',l:'送料無料 Miễn ship',i:'ti-truck'},{v:'newitem',l:'Hàng mới',i:'ti-sparkles'},{v:'noreserve',l:'Không giá sàn',i:'ti-lock-open'}];
var typeActive='all';
var extraActive={free:true,newitem:false,noreserve:false};
var allItems=[];

function chip(label,on,icon,click){
  var b=document.createElement('button');
  b.onclick=click;
  b.style.cssText='font-size:12px;padding:5px 12px;border-radius:99px;cursor:pointer;font-family:var(--font-sans);transition:all .12s;display:flex;align-items:center;gap:4px;';
  if(on){b.style.background='var(--color-text-primary)';b.style.color='var(--color-background-primary)';b.style.border='0.5px solid var(--color-text-primary)';}
  else{b.style.background='transparent';b.style.color='var(--color-text-secondary)';b.style.border='0.5px solid var(--color-border-secondary)';}
  if(icon){var ic=document.createElement('i');ic.className='ti '+icon;ic.style.fontSize='12px';b.appendChild(ic);}
  b.appendChild(document.createTextNode(label));
  return b;
}

function renderChips(){
  var tc=document.getElementById('tchips');tc.innerHTML='';
  typeOpts.forEach(function(o){tc.appendChild(chip(o.l,typeActive===o.v,null,function(){typeActive=o.v;renderChips();updCnt();}));});
  var oc=document.getElementById('ochips');oc.innerHTML='';
  extraOpts.forEach(function(o){oc.appendChild(chip(o.l,extraActive[o.v],o.i,function(){extraActive[o.v]=!extraActive[o.v];renderChips();updCnt();}));});
}
renderChips();

function updCnt(){
  var n=0;
  if(document.getElementById('minp').value)n++;
  if(document.getElementById('maxp').value)n++;
  if(typeActive!=='all')n++;
  Object.values(extraActive).forEach(function(v){if(v)n++;});
  var el=document.getElementById('acnt');
  if(n>0){el.style.display='';el.textContent=n+' bộ lọc';}
  else el.style.display='none';
}

function toggleF(){
  var b=document.getElementById('fbody');
  var open=b.style.display==='none';
  b.style.display=open?'block':'none';
  document.getElementById('chev').style.transform=open?'rotate(180deg)':'rotate(0deg)';
}

var PROXIES=[
  function(u){return 'https://api.allorigins.win/get?url='+encodeURIComponent(u);},
  function(u){return 'https://corsproxy.io/?'+encodeURIComponent(u);},
  function(u){return 'https://thingproxy.freeboard.io/fetch/'+u;}
];

function buildURL(){
  var kw=document.getElementById('kw').value.trim()||'kindle';
  var cat=document.getElementById('cat').value;
  var pref=document.getElementById('pref').value;
  var n=document.getElementById('pp').value;
  var sv=document.getElementById('srt').value;
  var minp=document.getElementById('minp').value;
  var maxp=document.getElementById('maxp').value;
  var sm={new:'s1=new&o1=d',end:'s1=end&o1=a',price_asc:'s1=cbids&o1=a',price_desc:'s1=cbids&o1=d',bids:'s1=bids&o1=d'};
  var url='https://auctions.yahoo.co.jp/search/search?p='+encodeURIComponent(kw)+'&va='+encodeURIComponent(kw)+'&'+(sm[sv]||sm.new)+'&n='+n+'&mode=2';
  if(cat)url+='&auccat='+cat;
  if(pref)url+='&is_postage_mode=1&dest_pref_code='+pref;
  if(minp)url+='&min='+minp;
  if(maxp)url+='&max='+maxp;
  if(typeActive==='auction')url+='&fixed=0';
  if(typeActive==='buynow')url+='&fixed=1';
  if(extraActive.newitem)url+='&new=1';
  if(extraActive.noreserve)url+='&noreserve=1';
  return url;
}

function fmtP(n){return n?'¥'+n.toLocaleString():'—';}

function parseItems(html){
  var doc=new DOMParser().parseFromString(html,'text/html');
  var items=[];
  var sels=['li[class*="Product"]','li.Product','.Product','li[data-auction-id]','li.b10118D0','[class*="sc-"]'];
  var nodes=[];
  for(var i=0;i<sels.length;i++){var r=doc.querySelectorAll(sels[i]);if(r.length>0){nodes=r;break;}}
  if(!nodes.length){nodes=[...doc.querySelectorAll('li')].filter(function(li){return li.textContent.includes('円')&&li.querySelector('img');});}
  nodes.forEach(function(n){
    try{
      var la=n.querySelector('a[href*="page.auctions"],a[href*="closeout"],a[href*="auctions.yahoo"]');
      var link=la?la.href:'';
      var tel=n.querySelector('[class*="title"],[class*="Title"],h3');
      var title=tel?tel.textContent.trim():'';
      if(!title){var lines=(n.innerText||n.textContent).split('\n').map(function(s){return s.trim();}).filter(function(s){return s.length>8&&!s.match(/^[\d,¥]+円?$/);});title=lines[0]||'';}
      if(!title)return;
      var img='';var ie=n.querySelector('img');
      if(ie)img=ie.src||ie.dataset.src||ie.getAttribute('data-lazy')||'';
      var pts=[];
      n.querySelectorAll('[class*="price"],[class*="Price"]').forEach(function(el){var t=el.textContent.trim();if(t.match(/[\d,]+円/))pts.push(t);});
      if(!pts.length){var ms=[...n.textContent.matchAll(/([\d,]+)円/g)];ms.forEach(function(m){pts.push(m[0]);});}
      var pp=function(s){if(!s)return null;var m=s.replace(/,/g,'').match(/(\d+)/);return m?parseInt(m[1]):null;};
      var cp=pp(pts[0]);if(!cp)return;
      var bn=pts.length>1?pp(pts[1]):null;
      var free=n.textContent.includes('送料無料');
      var isAuc=!!n.querySelector('[class*="bid"],[class*="Bid"]')||n.textContent.includes('入札');
      var tel2=n.querySelector('[class*="time"],[class*="Time"],time');
      var tl=tel2?tel2.textContent.trim():'';
      items.push({title:title,link:link,img:img,cp:cp,bn:bn,free:free,isAuc:isAuc,tl:tl});
    }catch(e){}
  });
  return items;
}

function cardHTML(it){
  return '<a href="'+(it.link||'#')+'" target="_blank" rel="noopener" style="display:grid;grid-template-columns:72px 1fr;gap:12px;padding:12px 14px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;text-decoration:none;color:inherit;margin-bottom:6px">'+
    '<div style="width:72px;height:72px;border-radius:8px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+
    (it.img?'<img src="'+it.img+'" alt="" loading="lazy" style="width:72px;height:72px;object-fit:cover" onerror="this.parentElement.innerHTML=\'<i class=ti ti-photo style=font-size:22px;color:var(--color-text-tertiary)></i>\'">'
    :'<i class="ti ti-photo" aria-hidden="true" style="font-size:22px;color:var(--color-text-tertiary)"></i>')+
    '</div>'+
    '<div style="min-width:0;display:flex;flex-direction:column;justify-content:space-between;gap:6px">'+
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">'+
    '<div style="font-size:13px;font-weight:500;color:var(--color-text-primary);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1;min-width:0">'+it.title+'</div>'+
    '<div style="text-align:right;flex-shrink:0">'+
    '<div style="font-size:15px;font-weight:500;color:var(--color-text-primary);white-space:nowrap">'+fmtP(it.cp)+'</div>'+
    (it.bn?'<div style="font-size:11px;color:var(--color-text-secondary);white-space:nowrap">即決 '+fmtP(it.bn)+'</div>':'')+
    '</div></div>'+
    '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'+
    (it.free?'<span style="font-size:11px;padding:2px 8px;border-radius:99px;background:#EAF3DE;color:#3B6D11;font-weight:500"><i class="ti ti-truck" aria-hidden="true" style="font-size:11px;vertical-align:-1px;margin-right:2px"></i>送料無料</span>':'')+
    (it.isAuc?'<span style="font-size:11px;padding:2px 8px;border-radius:99px;background:#E6F1FB;color:#185FA5;font-weight:500">Đấu giá</span>':'<span style="font-size:11px;padding:2px 8px;border-radius:99px;background:#FAEEDA;color:#854F0B;font-weight:500">即決</span>')+
    (it.tl?'<span style="font-size:11px;color:var(--color-text-tertiary);margin-left:auto;display:flex;align-items:center;gap:3px"><i class="ti ti-clock" aria-hidden="true" style="font-size:11px"></i>'+it.tl+'</span>':'')+
    '</div></div></a>';
}

function renderItems(items){
  var area=document.getElementById('results');
  if(!items.length){
    area.innerHTML='<div style="text-align:center;padding:3rem 1rem"><i class="ti ti-mood-empty" aria-hidden="true" style="font-size:36px;color:var(--color-text-tertiary);display:block;margin-bottom:10px"></i><p style="font-size:13px;color:var(--color-text-secondary)">Không tìm thấy sản phẩm nào</p><small style="font-size:12px;color:var(--color-text-tertiary)">Thử thay đổi từ khóa hoặc bộ lọc</small></div>';
    return;
  }
  var minp=parseInt(document.getElementById('minp').value)||0;
  var maxp=parseInt(document.getElementById('maxp').value)||Infinity;
  var filtered=items.filter(function(it){
    if(it.cp<minp||it.cp>maxp)return false;
    if(extraActive.free&&!it.free)return false;
    return true;
  });
  var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'+
    '<div style="font-size:13px;color:var(--color-text-secondary)">Hiển thị <strong style="color:var(--color-text-primary)">'+filtered.length+'</strong> / '+items.length+' sản phẩm</div>'+
    '<select onchange="csort(this.value)" style="font-size:12px;padding:4px 8px;height:28px;border:0.5px solid var(--color-border-tertiary);border-radius:8px;background:var(--color-background-secondary);color:var(--color-text-primary);font-family:var(--font-sans)">'+
    '<option value="">Mặc định</option><option value="pa">Giá tăng dần</option><option value="pd">Giá giảm dần</option><option value="fr">Ship miễn phí trước</option></select></div>'+
    '<div id="list">'+filtered.map(cardHTML).join('')+'</div>';
  area.innerHTML=html;
}

function csort(v){
  var s=allItems.slice();
  if(v==='pa')s.sort(function(a,b){return a.cp-b.cp;});
  else if(v==='pd')s.sort(function(a,b){return b.cp-a.cp;});
  else if(v==='fr')s.sort(function(a,b){return b.free-a.free;});
  var list=document.getElementById('list');
  if(list)list.innerHTML=s.map(cardHTML).join('');
}

async function doSearch(){
  var btn=document.getElementById('searchBtn');
  var stxt=document.getElementById('stxt');
  var notices=document.getElementById('notices');
  btn.disabled=true;
  btn.style.opacity='0.5';
  notices.innerHTML='';
  stxt.textContent='Đang kết nối...';
  document.getElementById('results').innerHTML='<div style="text-align:center;padding:2.5rem 1rem"><div style="display:inline-block;width:22px;height:22px;border:2px solid var(--color-border-tertiary);border-top-color:var(--color-text-secondary);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px"></div><p style="font-size:13px;color:var(--color-text-secondary)">Đang tải dữ liệu từ Yahoo Auctions...</p><small style="font-size:11px;color:var(--color-text-tertiary);display:block;margin-top:4px">Có thể mất vài giây</small></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
  var target=buildURL();
  var html='';var ok=false;
  for(var i=0;i<PROXIES.length;i++){
    try{
      stxt.textContent='Proxy '+(i+1)+'/'+PROXIES.length+'...';
      var r=await fetch(PROXIES[i](target),{headers:{Accept:'application/json,text/html'}});
      if(!r.ok)continue;
      var ct=r.headers.get('content-type')||'';
      if(ct.includes('json')){var j=await r.json();html=j.contents||j.body||'';}
      else html=await r.text();
      if(html&&html.length>500){ok=true;break;}
    }catch(e){}
  }
  btn.disabled=false;btn.style.opacity='1';
  if(!ok){
